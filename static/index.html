<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI小说转剧本工具</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: 30px auto; 
            padding: 20px; 
            background: #f5f5f5; 
        }
        .box { 
            background: white; 
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 20px; 
        }
        button { 
            background: #007acc; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 14px;
        }
        button:hover { background: #005fa3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .chapter-item { 
            border: 1px solid #eee; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 4px; 
            display: flex;
            align-items: center;
        }
        .chapter-item input { margin-right: 10px; }
        .chapter-title { font-weight: bold; }
        .chapter-preview { color: #666; font-size: 12px; margin-left: 10px; }
        
        #result { margin-top: 15px; padding: 10px; border-radius: 4px; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        .loading { background: #fff3e0; color: #e65100; }
        
        pre {
            background: #263238;
            color: #aed581;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 500px;
            font-size: 13px;
        }
        .yaml-box {
            margin-top: 15px;
        }
                /* 可视化预览样式 */
        .view-toggle { margin: 15px 0; }
        .view-toggle button { background: #fff; color: #007acc; border: 1px solid #007acc; margin-right: 10px; }
        .view-toggle button.active { background: #007acc; color: #fff; }
        
        .meta-box { background: #e3f2fd; padding: 12px; border-radius: 6px; margin-bottom: 15px; }
        .char-list { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .char-card { background: #f5f5f5; border: 1px solid #ddd; padding: 8px 12px; border-radius: 20px; font-size: 14px; }
        
        .scene-box { border: 2px solid #333; margin: 15px 0; background: #fff; }
        .scene-header { background: #333; color: #fff; padding: 8px 12px; font-weight: bold; }
        .scene-body { padding: 12px; }
        .scene-synopsis { color: #666; font-size: 13px; margin-bottom: 10px; font-style: italic; }
        
        .element { margin: 8px 0; padding: 8px; border-left: 3px solid #e0e0e0; background: #fafafa; }
        .element.action { border-left-color: #4caf50; }
        .element.dialogue { border-left-color: #2196f3; background: #e3f2fd; }
        .element.voiceover { border-left-color: #9c27b0; font-style: italic; color: #555; }
        .element.sound_effect { border-left-color: #ff9800; color: #e65100; }
        .element.low-confidence { border-left: 3px solid #f44336 !important; background: #ffebee !important; }
        
        .el-type { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 3px; }
        .el-character { font-weight: bold; color: #333; margin-bottom: 3px; }
        .el-content { line-height: 1.5; }
        .el-note { font-size: 11px; color: #f44336; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>🎬 AI 小说转剧本工具</h1>
    
    <!-- 上传区域 -->
    <div class="box">
        <h3>📤 步骤 1：上传小说（.txt 格式）</h3>
        <input type="file" id="fileInput" accept=".txt">
        <button onclick="uploadFile()">上传并解析章节</button>
        <div id="uploadResult"></div>
    </div>

    <!-- 章节列表 -->
    <div class="box" id="chapterBox" style="display:none;">
        <h3>📑 步骤 2：选择章节（建议选3章以上）</h3>
        <div id="chapterList"></div>
        <button onclick="startConvert()" id="convertBtn" style="margin-top:15px;">开始转换</button>
    </div>

    <!-- 转换结果 -->
    <div class="box" id="resultBox" style="display:none;">
        <h3>🎭 转换结果</h3>
        <div id="resultContent"></div>
    </div>

        <script>
        let currentFileName = '';
        let currentChapters = [];
        let generatedYaml = '';
        let currentView = 'raw'; // 'raw' 或 'visual'

        // ========== 上传文件 ==========
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('请先选择一个 .txt 文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('uploadResult').innerHTML = 
                '<div class="loading">⏳ 正在解析章节...</div>';

            fetch('http://localhost:5000/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('uploadResult').innerHTML = 
                        '<div class="error">❌ ' + data.error + '</div>';
                    return;
                }
                
                currentFileName = data.filename;
                currentChapters = data.chapters;
                
                document.getElementById('uploadResult').innerHTML = 
                    '<div class="success">✅ 解析成功！共 ' + data.total_chapters + ' 章</div>';
                
                showChapters(data.chapters);
            })
            .catch(err => {
                document.getElementById('uploadResult').innerHTML = 
                    '<div class="error">❌ 网络错误：' + err + '</div>';
            });
        }

        // ========== 显示章节列表 ==========
        function showChapters(chapters) {
            const box = document.getElementById('chapterBox');
            const list = document.getElementById('chapterList');
            box.style.display = 'block';
            
            if (chapters.length === 0) {
                list.innerHTML = '<div class="error">未检测到章节，请检查文件格式</div>';
                return;
            }
            
            list.innerHTML = chapters.map(ch => `
                <div class="chapter-item">
                    <input type="checkbox" value="${ch.id}" id="ch_${ch.id}" class="chapter-check">
                    <label for="ch_${ch.id}">
                        <span class="chapter-title">${ch.title}</span>
                        <span class="chapter-preview">${ch.content}</span>
                    </label>
                </div>
            `).join('');
        }

        // ========== 开始转换 ==========
        function startConvert() {
            const checked = document.querySelectorAll('.chapter-check:checked');
            if (checked.length === 0) {
                alert('请至少选择1章');
                return;
            }
            
            const ids = Array.from(checked).map(cb => parseInt(cb.value));
            
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            resultBox.style.display = 'block';
            resultContent.innerHTML = '<div class="loading">⏳ AI 正在转换，请等待 30-60 秒...</div>';
            
            document.getElementById('convertBtn').disabled = true;

            fetch('http://localhost:5000/api/convert', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chapter_ids: ids,
                    filename: currentFileName
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('convertBtn').disabled = false;
                
                if (data.error) {
                    resultContent.innerHTML = '<div class="error">❌ 转换失败：' + data.error + '</div>';
                    return;
                }
                
                generatedYaml = data.yaml;
                
                // 显示结果区，带切换按钮
                             resultContent.innerHTML = `
                    <div class="success">✅ 转换完成！已转换 ${data.selected_chapters} 章</div>
                    <div class="view-toggle">
                        <button id="btnRaw" class="active" onclick="showRaw()">📄 原始 YAML</button>
                        <button id="btnVisual" onclick="showVisual()">🎬 可视化预览</button>
                        <button id="btnEdit" onclick="showEditor()">✏️ 编辑角色</button>
                    </div>
                    <div style="margin:10px 0;">
                        <span>导出格式：</span>
                        <button onclick="exportFile('yaml')" style="padding:5px 10px;font-size:12px;">YAML</button>
                        <button onclick="exportFile('txt')" style="padding:5px 10px;font-size:12px;">剧本文本 (.txt)</button>
                    </div>
                    <div id="rawView">
                        <pre>${escapeHtml(data.yaml)}</pre>
                    </div>
                    <div id="visualView" style="display:none;">
                        ⏳ 正在渲染可视化预览...
                    </div>
                    <div id="editView" style="display:none;">
                        ⏳ 加载编辑器...
                    </div>
                `;
                currentView = 'raw';
            })
            .catch(err => {
                document.getElementById('convertBtn').disabled = false;
                resultContent.innerHTML = '<div class="error">❌ 错误：' + err + '</div>';
            });
        }

        // ========== 切换视图 ==========
        function showRaw() {
            document.getElementById('rawView').style.display = 'block';
            document.getElementById('visualView').style.display = 'none';
            document.getElementById('btnRaw').classList.add('active');
            document.getElementById('btnVisual').classList.remove('active');
            currentView = 'raw';
        }

        function showVisual() {
            document.getElementById('rawView').style.display = 'none';
            document.getElementById('visualView').style.display = 'block';
            document.getElementById('btnRaw').classList.remove('active');
            document.getElementById('btnVisual').classList.add('active');
            
            if (currentView !== 'visual') {
                currentView = 'visual';
                loadVisual();
            }
        }

        // ========== 加载可视化 ==========
        function loadVisual() {
            const container = document.getElementById('visualView');
            container.innerHTML = '⏳ 正在解析 YAML...';
            
            fetch('http://localhost:5000/api/parse-yaml', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({yaml: generatedYaml})
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    container.innerHTML = renderScreenplay(result.data);
                } else {
                    container.innerHTML = '<div class="error">❌ 可视化解析失败：' + result.error + '</div>';
                }
            })
            .catch(err => {
                container.innerHTML = '<div class="error">❌ 网络错误：' + err + '</div>';
            });
        }

        // ========== 渲染剧本卡片（修复版）==========
        function renderScreenplay(data) {
            if (!data || !data.screenplay) {
                // 兼容没有 screenplay 根节点的情况
                if (data && data.metadata) {
                    data = {screenplay: data};
                } else {
                    return '<div class="error">YAML 结构不符合预期</div>';
                }
            }
            
            const sp = data.screenplay;
            let html = '';
            
            // 建立角色ID→名字映射表（关键修复！）
            const charMap = {};
            if (sp.dramatis_personae) {
                sp.dramatis_personae.forEach(char => {
                    charMap[char.id] = char.name || char.id;
                    // 如果 character_id 直接存的是名字，也映射
                    charMap[char.name] = char.name;
                });
            }
            
            // 元数据
            if (sp.metadata) {
                const meta = sp.metadata;
                html += `<div class="meta-box">
                    <strong>🎬 ${meta.title || '未命名剧本'}</strong><br>
                    <small>来源章节：${(meta.source_chapters || []).join(', ')}</small>
                </div>`;
            }
            
            // 角色表
            if (sp.dramatis_personae && sp.dramatis_personae.length > 0) {
                html += '<h4>👥 角色</h4><div class="char-list">';
                sp.dramatis_personae.forEach(char => {
                    html += `<div class="char-card">
                        <strong>${char.name || '未命名'}</strong>
                        ${char.description ? '<br><small>' + char.description + '</small>' : ''}
                    </div>`;
                });
                html += '</div>';
            }
            
            // 场景
            if (sp.scenes && sp.scenes.length > 0) {
                sp.scenes.forEach((scene, idx) => {
                    const heading = scene.heading || {};
                    const location = heading.location || '未知地点';
                    const time = heading.time_of_day || '未知时间';
                    const intExt = heading.interior_exterior || 'INT';
                    
                    html += `<div class="scene-box">
                        <div class="scene-header">
                            ${intExt}. ${location} - ${time}
                        </div>
                        <div class="scene-body">
                            ${scene.synopsis ? `<div class="scene-synopsis">${scene.synopsis}</div>` : ''}
                    `;
                    
                    if (scene.elements && scene.elements.length > 0) {
                        scene.elements.forEach(el => {
                            const type = el.type || 'action';
                            const conf = (el.notes && el.notes.confidence) ? el.notes.confidence : 1.0;
                            const lowConf = conf < 0.8 ? 'low-confidence' : '';
                            
                            // 关键修复：用 charMap 把 ID 翻译成名字
                            let displayName = el.character_id;
                            if (el.character_id && charMap[el.character_id]) {
                                displayName = charMap[el.character_id];
                            }
                            
                            html += `<div class="element ${type} ${lowConf}">
                                <div class="el-type">${type}</div>
                                ${el.character_id ? `<div class="el-character">${displayName}</div>` : ''}
                                <div class="el-content">${el.content || ''}</div>
                                ${lowConf ? `<div class="el-note">⚠️ AI 置信度较低 (${conf})，建议人工复核</div>` : ''}
                            </div>`;
                        });
                    }
                    
                    html += '</div></div>';
                });
            } else {
                html += '<div class="error">未检测到场景数据</div>';
            }
            
            return html;
        }
        // ========== 下载 YAML ==========
        function downloadYaml() {
            if (!generatedYaml) {
                alert('没有可下载的内容');
                return;
            }
            const blob = new Blob([generatedYaml], {type: 'text/yaml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'screenplay.yaml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
                // ========== 导出文件 ==========
        function exportFile(format) {
            if (!generatedYaml) {
                alert('没有可导出的内容');
                return;
            }
            
            fetch('http://localhost:5000/api/export', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    yaml: generatedYaml,
                    format: format
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    alert('导出失败：' + data.error);
                    return;
                }
                // 下载
                const blob = new Blob([data.content], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            })
            .catch(err => alert('导出错误：' + err));
        }

        // ========== 切换视图：编辑角色 ==========
        function showEditor() {
            document.getElementById('rawView').style.display = 'none';
            document.getElementById('visualView').style.display = 'none';
            document.getElementById('editView').style.display = 'block';
            document.getElementById('btnRaw').classList.remove('active');
            document.getElementById('btnVisual').classList.remove('active');
            document.getElementById('btnEdit').classList.add('active');
            
            loadEditor();
        }

        // ========== 加载角色编辑器 ==========
        function loadEditor() {
            const container = document.getElementById('editView');
            container.innerHTML = '⏳ 加载中...';
            
            fetch('http://localhost:5000/api/parse-yaml', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({yaml: generatedYaml})
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    renderEditor(result.data);
                } else {
                    container.innerHTML = '<div class="error">加载失败</div>';
                }
            })
            .catch(err => {
                container.innerHTML = '<div class="error">错误：' + err + '</div>';
            });
        }

                   // 辅助：正则转义
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        // ========== 渲染角色编辑器 ==========
        function renderEditor(data) {
            const container = document.getElementById('editView');
            const sp = data.screenplay || data;
            const chars = sp.dramatis_personae || [];
            
            if (chars.length === 0) {
                container.innerHTML = '<div class="error">没有检测到角色</div>';
                return;
            }
            
            let html = `<h4>✏️ 编辑角色信息</h4>
                <p style="color:#666;font-size:13px;">共 <strong>${chars.length}</strong> 个角色。修改后点击保存，剧本中所有引用会自动同步。</p>
                <div id="charEditorList">`;
            
            chars.forEach((char, idx) => {
                // 关键：用 data-old-name 记住原始名字，用于精确替换
                html += `
                    <div style="border:1px solid #ddd;padding:12px;margin:8px 0;border-radius:4px;background:#fafafa;">
                        <div style="margin-bottom:8px;">
                            <label style="font-size:12px;color:#666;">角色ID：</label>
                            <input type="text" value="${char.id || ''}" disabled style="background:#eee;width:100%;padding:4px;">
                        </div>
                        <div style="margin-bottom:8px;">
                            <label style="font-size:12px;color:#666;">角色名：</label>
                            <input type="text" id="char_name_${idx}" value="${escapeHtml(char.name || '')}" data-old-name="${escapeHtml(char.name || '')}" style="width:100%;padding:4px;">
                        </div>
                        <div>
                            <label style="font-size:12px;color:#666;">描述：</label>
                            <input type="text" id="char_desc_${idx}" value="${escapeHtml(char.description || '')}" data-old-desc="${escapeHtml(char.description || '')}" style="width:100%;padding:4px;">
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            html += `<button onclick="saveCharacters()" style="margin-top:10px;">💾 保存到 YAML</button>`;
            
            container.innerHTML = html;
        }
        
        // ========== 保存角色（全局精确替换）==========
        function saveCharacters() {
            let idx = 0;
            let changes = 0;
            
            while (true) {
                const nameInput = document.getElementById(`char_name_${idx}`);
                if (!nameInput) break;  // 没有更多角色了
                
                const oldName = nameInput.getAttribute('data-old-name');
                const newName = nameInput.value;
                
                // 如果名字变了，全局精确替换（split/join 不会误伤"沉默"这类包含词）
                if (oldName && oldName !== newName && oldName !== '') {
                    const parts = generatedYaml.split(oldName);
                    if (parts.length > 1) {
                        generatedYaml = parts.join(newName);
                        changes += parts.length - 1;
                        nameInput.setAttribute('data-old-name', newName);
                    }
                }
                
                // 描述同理
                const descInput = document.getElementById(`char_desc_${idx}`);
                if (descInput) {
                    const oldDesc = descInput.getAttribute('data-old-desc');
                    const newDesc = descInput.value;
                    if (oldDesc && oldDesc !== newDesc && oldDesc !== '') {
                        const parts = generatedYaml.split(oldDesc);
                        if (parts.length > 1) {
                            generatedYaml = parts.join(newDesc);
                            changes += parts.length - 1;
                            descInput.setAttribute('data-old-desc', newDesc);
                        }
                    }
                }
                
                idx++;
            }
            
            // 更新原始 YAML 视图
            document.getElementById('rawView').innerHTML = '<pre>' + escapeHtml(generatedYaml) + '</pre>';
            
            // 如果可视化视图是打开的，刷新它
            if (currentView === 'visual') {
                loadVisual();
            }
            
            alert(`✅ 已保存！共修改 ${changes} 处。`);
        }
        // ========== 工具函数 ==========
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
